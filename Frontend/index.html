<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPro — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/stylesum,ary.css">
    <style>
        /* ── User: ตารางเต็มความกว้าง ── */
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-boxes-stacked"></i>
            <span>StockPro</span>
        </div>

        <div class="sidebar-user" id="sidebar-user">
            <div class="user-avatar" id="user-avatar">?</div>
            <div class="user-info">
                <div class="user-name" id="user-name">-</div>
                <div class="user-role" id="user-role">-</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="index.html" class="active"><i class="fas fa-home"></i> Overview</a>
            <a href="/Frontend/pages/Inventory/index.html" id="nav-inventory" style="display:none"><i class="fas fa-box"></i> Inventory</a>
            <a href="/Frontend/pages/History/index.html"   id="nav-history"   style="display:none"><i class="fas fa-history"></i> History</a>
            <a href="/Frontend/pages/DailySummary/index.html" id="nav-summary" style="display:none"><i class="fas fa-calendar-check"></i> Daily Summary</a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-summary" id="btn-daily-summary" onclick="showDailySummary()" style="display:none">
                <i class="fas fa-file-alt"></i> Daily Summary
            </button>
            <button class="btn-logout" onclick="logout('')">
                <i class="fas fa-right-from-bracket"></i> ออกจากระบบ
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <h1>Dashboard Overview</h1>
            <div id="low-stock-alert" class="alert-banner"></div>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="card stat-card" id="card-total">
                <div class="stat-icon blue"><i class="fas fa-box"></i></div>
                <div class="stat-info">
                    <h3>Total Products</h3>
                    <p id="stat-total">0</p>
                </div>
            </div>
            <div class="card stat-card" id="card-low">
                <div class="stat-icon red"><i class="fas fa-arrow-trend-down"></i></div>
                <div class="stat-info">
                    <h3>Low Stock</h3>
                    <p id="stat-low" class="text-danger">0</p>
                </div>
            </div>
        </div>

        <div class="management-grid" id="mgmt-grid">
            <!-- Add Product: Admin only -->
            <section class="card form-section" id="section-add-product" style="display:none">
                <h2><i class="fas fa-plus-circle"></i> New Product</h2>
                <div class="form-group">
                    <input type="text"   id="p-name" placeholder="Product name">
                    <input type="number" id="p-qty"  placeholder="Initial stock">
                    <input type="number" id="p-min"  placeholder="Min stock">
                    <button class="btn-add" onclick="addItem()"><i class="fas fa-plus"></i> Add Product</button>
                </div>
            </section>

            <!-- Table -->
            <section class="card table-container" id="table-section">
                <div class="table-header">
                    <h2><i class="fas fa-list"></i> Inventory List</h2>
                    <div class="table-header-right">
                        <button class="btn-export" onclick="exportCSV()" title="Export to CSV">
                            <i class="fas fa-download"></i> Export CSV
                        </button>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="search-input" placeholder="Search product..." onkeyup="filterProducts()">
                        </div>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Stock</th>
                            <th>Min</th>
                            <th>Status</th>
                            <th id="th-actions" style="display:none">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body"></tbody>
                </table>
            </section>
        </div>
    </main>
</div>

<!-- ── Edit Product Modal ── -->
<div id="edit-modal" class="modal-overlay" style="display:none" onclick="closeEditModal(event)">
    <div class="modal-box">
        <div class="modal-header">
            <h3><i class="fas fa-pen-to-square"></i> แก้ไขสินค้า</h3>
            <button class="modal-close" onclick="closeEditModal()"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="edit-id">
            <div class="edit-form-group">
                <label>ชื่อสินค้า</label>
                <input type="text" id="edit-name" placeholder="Product name">
            </div>
            <div class="edit-form-row">
                <div class="edit-form-group">
                    <label>จำนวนสต็อก</label>
                    <input type="number" id="edit-qty" placeholder="Stock" min="0">
                </div>
                <div class="edit-form-group">
                    <label>สต็อกขั้นต่ำ</label>
                    <input type="number" id="edit-min" placeholder="Min stock" min="0">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeEditModal()"><i class="fas fa-xmark"></i> ยกเลิก</button>
            <button class="btn-save" onclick="saveEdit()"><i class="fas fa-check"></i> บันทึก</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/Frontend/js/auth.js"></script>
<script src="/Frontend/js/api.js"></script>
<script src="/Frontend/script.js"></script>
<script>
    // User: ขยายตารางเต็มความกว้าง
    window.addEventListener('DOMContentLoaded', () => {
        const session = sessionStorage.getItem('stockpro_user')
        if (session) {
            const u = JSON.parse(session)
            if (u.role !== 'admin') {
                document.getElementById('table-section').classList.add('full-width')
                // ใส่ data-num ให้ stat card แสดง ghost number
                document.getElementById('card-total').dataset.num = '0'
                document.getElementById('card-low').dataset.num   = '0'
            }
        }
    })
</script>
</body>
</html>
